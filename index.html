  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мой тестовый сайт — Авторизация</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #333;
    }

    .container {
      background: white;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
      color: #4a4a4a;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #777;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 24px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #555;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.25s ease;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    }

    input.error-field {
      border-color: #e53e3e;
      box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.15);
    }

    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 20px;
      color: #888;
      user-select: none;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button[type="submit"]:hover {
      background: #5a6ee0;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.35);
    }

    .extra-links {
      margin-top: 25px;
      font-size: 14px;
    }

    .extra-links a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .extra-links a:hover {
      text-decoration: underline;
    }

    /* Error message styles */
    .error-message {
      display: none;
      margin-top: 18px;
      padding: 14px 16px;
      background: #fff5f5;
      color: #c53030;
      border: 1px solid #feb2b2;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-align: left;
    }

    .error-message.visible {
      display: block;
    }

    /* Success message styles */
    .success-message {
      display: none;
      margin-top: 25px;
      padding: 15px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 10px;
      font-weight: 500;
    }

    .success-message.visible {
      display: block;
    }

    .field-error {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #c53030;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Добро пожаловать</h1>
    <p class="subtitle">Войдите в свой аккаунт</p>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Логин или email</label>
        <input type="text" id="username" placeholder="ivan123 или ivan@example.com" autocomplete="username">
        <span class="field-error" id="usernameError"></span>
      </div>

      <div class="form-group">
        <label for="password">Пароль</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <span class="toggle-password" id="togglePassword" role="button" aria-label="Показать/скрыть пароль">👁</span>
        </div>
        <span class="field-error" id="passwordError"></span>
      </div>

      <button type="submit" id="loginBtn">Войти</button>
    </form>

    <!-- Сообщение об ошибке входа (TC-02: неверный пароль) -->
    <div class="error-message" id="errorMsg"></div>

    <div class="extra-links">
      <a href="#">Забыли пароль?</a> • <a href="#">Создать аккаунт</a>
    </div>

    <!-- Сообщение об успешном входе (TC-01) -->
    <div class="success-message" id="successMsg">
      Успешный вход! Добро пожаловать, <span id="userName"></span> 🎉
    </div>
  </div>

  <script>
    // ────────────────────────────────
    //  Простая база пользователей
    //  для корректной работы тест-кейсов
    // ────────────────────────────────
    const USERS = {
      'testuser':       'password123',
      'admin':          'admin123',
      'ivan@example.com': 'password123'
    };

    const form          = document.getElementById('loginForm');
    const loginBtn      = document.getElementById('loginBtn');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const usernameInput = document.getElementById('username');
    const successMsg    = document.getElementById('successMsg');
    const errorMsg      = document.getElementById('errorMsg');
    const userNameSpan  = document.getElementById('userName');
    const usernameError = document.getElementById('usernameError');
    const passwordError = document.getElementById('passwordError');

    // ── Показать / скрыть пароль ──
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.textContent = isPassword ? '🙈' : '👁';
    });

    // ── Сброс ошибок при вводе ──
    usernameInput.addEventListener('input', clearErrors);
    passwordInput.addEventListener('input', clearErrors);

    function clearErrors() {
      usernameInput.classList.remove('error-field');
      passwordInput.classList.remove('error-field');
      usernameError.textContent = '';
      passwordError.textContent = '';
      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';
    }

    // ── Валидация и обработка входа ──
    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      let valid = true;

      // TC-03: Проверка пустых полей
      if (!username) {
        usernameInput.classList.add('error-field');
        usernameError.textContent = 'Поле «Логин или email» обязательно для заполнения.';
        valid = false;
      }

      if (!password) {
        passwordInput.classList.add('error-field');
        passwordError.textContent = 'Поле «Пароль» обязательно для заполнения.';
        valid = false;
      }

      if (!valid) return;

      // TC-01 / TC-02: Проверка учётных данных
      const expectedPassword = USERS[username];

      if (!expectedPassword) {
        // Пользователь не найден
        errorMsg.textContent = 'Пользователь с таким логином не найден.';
        errorMsg.classList.add('visible');
        usernameInput.classList.add('error-field');
        return;
      }

      if (expectedPassword !== password) {
        // TC-02: Неверный пароль
        errorMsg.textContent = 'Неверный пароль. Пожалуйста, проверьте введённые данные.';
        errorMsg.classList.add('visible');
        passwordInput.classList.add('error-field');
        return;
      }

      // TC-01: Успешный вход
      form.style.display = 'none';
      errorMsg.classList.remove('visible');
      successMsg.classList.add('visible');
      userNameSpan.textContent = username;
    });
  </script>

</body>
</html>
